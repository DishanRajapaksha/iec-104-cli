name: Apply registry parser migration

on:
  push:
    branches:
      - agent/adopt-registry-parser
  pull_request:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-parser
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Replace prefix parser
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("internal/cli/root.go")
          text = path.read_text()
          command_import = '\t"github.com/DishanRajapaksha/industrial-cli-kit/command"\n'
          config_import = '\t"github.com/DishanRajapaksha/iec-104-cli/internal/config"\n'
          if command_import not in text:
              text = text.replace(config_import, config_import + command_import, 1)

          start = text.index("func parseGlobalOptions")
          end = text.index("func printHelp", start)
          replacement = '''func parseGlobalOptions(args []string) (globalOptions, []string, error) {
          \tvalidated := defaultGlobalOptions()
          \thelpRequested := false
          \tversionRequested := false
          \traw := flag.NewFlagSet("global-validation", flag.ContinueOnError)
          \traw.SetOutput(io.Discard)
          \traw.StringVar(&validated.ConfigPath, "config", validated.ConfigPath, "")
          \traw.StringVar(&validated.Profile, "profile", validated.Profile, "")
          \traw.StringVar(&validated.Format, "format", validated.Format, "")
          \traw.DurationVar(&validated.Timeout, "timeout", validated.Timeout, "")
          \traw.BoolVar(&validated.Verbose, "verbose", validated.Verbose, "")
          \traw.BoolVar(&validated.Debug, "debug", validated.Debug, "")
          \traw.BoolVar(&validated.DumpFrames, "dump-frames", validated.DumpFrames, "")
          \traw.BoolVar(&helpRequested, "help", false, "")
          \traw.BoolVar(&helpRequested, "h", false, "")
          \traw.BoolVar(&versionRequested, "version", false, "")
          \traw.BoolVar(&versionRequested, "v", false, "")
          \tif err := raw.Parse(args); err != nil {
          \t\treturn validated, nil, err
          \t}
          \tif _, ok := allowedFormats[validated.Format]; !ok {
          \t\treturn validated, nil, fmt.Errorf("invalid output format %q; expected one of table, text, json, jsonl, csv", validated.Format)
          \t}
          \ttimeoutSet := false
          \traw.Visit(func(parsed *flag.Flag) {
          \t\tif parsed.Name == "timeout" {
          \t\t\ttimeoutSet = true
          \t\t}
          \t})
          \tif timeoutSet && validated.Timeout <= 0 {
          \t\treturn validated, nil, fmt.Errorf("timeout must be positive")
          \t}
          \tif helpRequested {
          \t\treturn validated, append([]string{"--help"}, raw.Args()...), nil
          \t}
          \tif versionRequested {
          \t\treturn validated, append([]string{"--version"}, raw.Args()...), nil
          \t}

          \tfiltered, err := command.FilterGlobalFlagsForRegistry(args, cliRegistry)
          \tif err != nil {
          \t\treturn defaultGlobalOptions(), nil, err
          \t}

          \topts := defaultGlobalOptions()
          \tfs := flag.NewFlagSet("global", flag.ContinueOnError)
          \tfs.SetOutput(io.Discard)
          \tfs.StringVar(&opts.ConfigPath, "config", opts.ConfigPath, "")
          \tfs.StringVar(&opts.Profile, "profile", opts.Profile, "")
          \tfs.StringVar(&opts.Format, "format", opts.Format, "")
          \tfs.DurationVar(&opts.Timeout, "timeout", opts.Timeout, "")
          \tfs.BoolVar(&opts.Verbose, "verbose", opts.Verbose, "")
          \tfs.BoolVar(&opts.Debug, "debug", opts.Debug, "")
          \tfs.BoolVar(&opts.DumpFrames, "dump-frames", opts.DumpFrames, "")
          \tif err := fs.Parse(filtered); err != nil {
          \t\treturn opts, nil, err
          \t}
          \treturn opts, fs.Args(), nil
          }

          '''
          text = text[:start] + replacement + text[end:]
          path.write_text(text)
          PY
          gofmt -w internal/cli/root.go
      - name: Resolve shared CLI kit
        run: |
          go get github.com/DishanRajapaksha/industrial-cli-kit@0d5ccd0d9419
          go mod tidy
      - name: Capture migration tests
        run: |
          set +e
          go test ./... > test.log 2>&1
          echo "$?" > test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: registry-migration-test-log
          path: |
            test.log
            test.status
      - name: Require passing tests
        run: |
          status=$(cat test.status)
          if [ "$status" -ne 0 ]; then
            cat test.log
            exit "$status"
          fi
      - name: Commit migration
        run: |
          if git diff --quiet -- internal/cli/root.go go.mod go.sum; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/cli/root.go go.mod go.sum
          git commit -m "Use registry-aware global flag parsing"
          git push origin HEAD:agent/adopt-registry-parser
