name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/align-cli-contracts
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply contract review fixes
        run: python3 scripts/fix-cli-contract-review.py

      - name: Format
        run: gofmt -w internal/cli/output.go internal/cli/root.go internal/cli/stream_contracts_test.go

      - name: Run tests
        run: go test ./...

      - name: Build
        run: make build

      - name: Commit verified source changes
        run: |
          rm -rf bin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            internal/cli/output.go \
            internal/cli/root.go \
            internal/cli/stream_contracts_test.go
          git commit -m "Fix IEC 104 CSV stream contract"
          git push origin HEAD:agent/align-cli-contracts
