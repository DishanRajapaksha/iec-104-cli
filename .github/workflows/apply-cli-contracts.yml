name: apply-cli-contracts

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/align-cli-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/align-cli-contracts
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Apply contract alignment
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          exitcodes = Path("internal/exitcode/exitcode.go")
          exitcodes.write_text('''package exitcode

const (
    Success                  = 0
    GeneralError             = 1
    ConfigError              = 2
    TransportConnectionError = 3
    ProtocolRequestError     = 4
    WriteControlRejected     = 7
    OperationTimeout         = 8
    OutputError              = 9

    // Protocol-specific aliases retain descriptive names without changing the
    // shared cross-CLI meanings of the numeric values.
    TCPConnectionError   = TransportConnectionError
    IEC104SessionError   = ProtocolRequestError
    UnsupportedASDU      = ProtocolRequestError
    InterrogationTimeout = OperationTimeout
    CommandRejected      = WriteControlRejected
    CommandTimeout       = OperationTimeout
)
''')

          root = Path("internal/cli/root.go")
          text = root.read_text()
          text = text.replace(
              'snapshotFormatHelp = "output format: table, text, json, jsonl, csv"\n\tstreamFormatHelp   = "output format: text, jsonl, csv, table, json"',
              'snapshotFormatHelp = "output format: table, text, json, csv"\n\tstreamFormatHelp   = "output format: text, jsonl, csv"',
              1,
          )

          marker = '''var allowedFormats = map[string]struct{}{
\t"table": {},
\t"text":  {},
\t"json":  {},
\t"jsonl": {},
\t"csv":   {},
}
'''
          helpers = marker + '''
func validateSnapshotFormat(format string) error {
\tswitch format {
\tcase "table", "text", "json", "csv":
\t\treturn nil
\tcase "jsonl":
\t\treturn fmt.Errorf("snapshot commands produce one result; use --format json instead of --format jsonl")
\tdefault:
\t\treturn fmt.Errorf("invalid snapshot output format %q; expected table, text, json, or csv", format)
\t}
}

func validateStreamFormat(format string) error {
\tswitch format {
\tcase "text", "jsonl", "csv":
\t\treturn nil
\tcase "json":
\t\treturn fmt.Errorf("stream commands use line-delimited output; use --format jsonl instead of --format json")
\tcase "table":
\t\treturn fmt.Errorf("stream commands do not support table output; use text, jsonl, or csv")
\tdefault:
\t\treturn fmt.Errorf("invalid stream output format %q; expected text, jsonl, or csv", format)
\t}
}
'''
          if marker not in text:
              raise SystemExit("allowedFormats marker not found")
          text = text.replace(marker, helpers, 1)

          def replace_validation(source, func_name, validator):
              start = source.find(f"func {func_name}(")
              if start < 0:
                  raise SystemExit(f"function {func_name} not found")
              end = source.find("\nfunc ", start + 1)
              if end < 0:
                  end = len(source)
              segment = source[start:end]
              pattern = re.compile(
                  r'\tif _, ok := allowedFormats\[format\]; !ok \{\n'
                  r'.*?\t\treturn exitcode\.ConfigError\n\t\}',
                  re.S,
              )
              replacement = (
                  f'\tif err := {validator}(format); err != nil {{\n'
                  '\t\tfmt.Fprintln(os.Stderr, err)\n'
                  '\t\treturn exitcode.ConfigError\n'
                  '\t}'
              )
              updated, count = pattern.subn(replacement, segment, count=1)
              if count != 1:
                  raise SystemExit(f"{func_name}: expected one format validation block, found {count}")
              return source[:start] + updated + source[end:]

          for name in ("runInterrogate", "runRead"):
              text = replace_validation(text, name, "validateSnapshotFormat")
          for name in ("runListen", "runWatch"):
              text = replace_validation(text, name, "validateStreamFormat")

          root.write_text(text)

          readme = Path("README.md")
          text = readme.read_text()
          text = text.replace(
              '''Most read-only commands support:

```text
table
text
json
jsonl
csv
```

Verbose and debug logs go to stderr so JSON and JSONL stdout remain script-friendly.''',
              '''Snapshot commands support:

```text
table
text
json
csv
```

Streaming commands support:

```text
text
jsonl
csv
```

Verbose and debug logs go to stderr so JSON, JSONL, and CSV stdout remain script-friendly.''',
              1,
          )
          text = text.replace(
              '''0  success
1  general error
2  config error
3  TCP connection error
4  IEC 104 session or STARTDT error
5  interrogation timeout
6  unsupported ASDU or type
7  command rejected
8  command timeout
9  output or formatting error''',
              '''0  success
1  general error
2  usage or configuration error
3  transport or connection error
4  protocol or request error
7  write or control rejected
8  operation timeout
9  output or formatting error''',
              1,
          )
          readme.write_text(text)

          Path("internal/cli/contracts_test.go").write_text(r'''package cli

import (
    "testing"

    "github.com/DishanRajapaksha/iec-104-cli/internal/exitcode"
)

func TestSnapshotFormatContract(t *testing.T) {
    for _, format := range []string{"table", "text", "json", "csv"} {
        if err := validateSnapshotFormat(format); err != nil {
            t.Fatalf("snapshot format %q rejected: %v", format, err)
        }
    }
    if err := validateSnapshotFormat("jsonl"); err == nil {
        t.Fatal("snapshot commands must reject jsonl")
    }
}

func TestStreamFormatContract(t *testing.T) {
    for _, format := range []string{"text", "jsonl", "csv"} {
        if err := validateStreamFormat(format); err != nil {
            t.Fatalf("stream format %q rejected: %v", format, err)
        }
    }
    for _, format := range []string{"table", "json"} {
        if err := validateStreamFormat(format); err == nil {
            t.Fatalf("stream format %q must be rejected", format)
        }
    }
}

func TestSharedExitCodeContract(t *testing.T) {
    if exitcode.TransportConnectionError != 3 || exitcode.ProtocolRequestError != 4 {
        t.Fatal("transport and protocol exit codes changed")
    }
    if exitcode.WriteControlRejected != 7 || exitcode.OperationTimeout != 8 || exitcode.OutputError != 9 {
        t.Fatal("write, timeout, or output exit codes changed")
    }
    if exitcode.IEC104SessionError != exitcode.ProtocolRequestError || exitcode.UnsupportedASDU != exitcode.ProtocolRequestError {
        t.Fatal("IEC 104 protocol aliases do not use the shared protocol error code")
    }
    if exitcode.InterrogationTimeout != exitcode.OperationTimeout || exitcode.CommandTimeout != exitcode.OperationTimeout {
        t.Fatal("IEC 104 timeout aliases do not use the shared timeout code")
    }
}
''')
          PY

          gofmt -w internal/exitcode/exitcode.go internal/cli/root.go internal/cli/contracts_test.go
          go test ./...

      - name: Commit aligned contracts
        shell: bash
        run: |
          rm .github/workflows/apply-cli-contracts.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align CLI contracts"
          git push origin HEAD:agent/align-cli-contracts
