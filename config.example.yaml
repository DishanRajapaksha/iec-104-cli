connection:
  host: 127.0.0.1
  port: 2404
  timeout: 10s
  reconnect: true
  reconnect_interval: 5s

iec104:
  common_address: 1
  originator_address: 0
  interrogation_qualifier: 20

output:
  format: table
  timestamps: local

# Optional external point files. Supported formats:
# - CSV with columns: name,ioa,type,unit
# - YAML as a list of points or an object with a points key
point_files: []

points:
  - name: active_power
    ioa: 1001
    type: float
    unit: MW
